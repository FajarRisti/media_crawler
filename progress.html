<!DOCTYPE html>
<html>
<head>
    <title>Crawler Progress</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; color: white; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .progress-container { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; margin: 20px 0; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .progress-bar { background: rgba(255,255,255,0.2); height: 40px; border-radius: 20px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: width 0.3s ease; display: flex; align-items: center; padding-left: 20px; font-weight: bold; color: #000; }
        #status { text-align: center; font-size: 1.2em; margin: 20px 0; }
        #log { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 20px; height: 300px; overflow-y: scroll; white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.4; backdrop-filter: blur(5px); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 20px; text-align: center; }
        button { background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Media Crawler Progress</h1>
        <div class="progress-container">
            <div id="status">Waiting for crawl...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%">
                    0%
                </div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div style="font-size: 2em; font-weight: bold;" id="total-items">0</div>
                    <div>Total Items</div>
                </div>
                <div class="stat">
                    <div style="font-size: 2em;" id="x-count">0</div>
                    <div>X/Twitter</div>
                </div>
                <div class="stat">
                    <div style="font-size: 2em;" id="yt-count">0</div>
                    <div>YouTube</div>
                </div>
                <div class="stat">
                    <div style="font-size: 2em;" id="ig-count">0</div>
                    <div>Instagram</div>
                </div>
            </div>
        </div>
        <div id="log">Loading live logs...</div>
        <button onclick="location.href='/'>← Back to Dashboard</button>
    </div>
    
    <script>
        let totalData = 0;
        
        async function update() {
            try {
                // Data stats
                const dataRes = await fetch('/data.json');
                const data = await dataRes.json();
                totalData = data.length;
                
                const counts = data.reduce((acc, item) => {
                    acc[item.source] = (acc[item.source] || 0) + 1;
                    return acc;
                }, {});
                
                document.getElementById('total-items').textContent = totalData;
                document.getElementById('x-count').textContent = counts.twitter || counts.x_rss || 0;
                document.getElementById('yt-count').textContent = counts.youtube || counts.youtube_rss || 0;
                document.getElementById('ig-count').textContent = counts.instagram || 0;
                
                // Progress estimate (heuristic based on data growth)
                const pct = Math.min(totalData * 5, 100);
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('progress-fill').textContent = Math.round(pct) + '%';
                
                if (totalData > 5) {
                    document.getElementById('status').textContent = `Crawling complete! Found ${totalData} items`;
                    document.getElementById('progress-fill').style.background = 'linear-gradient(90deg, #4ade80 0%, #22c55e 100%)';
                } else if (totalData > 0) {
                    document.getElementById('status').textContent = `Crawling... ${totalData} items so far`;
                }
                
                // Logs
                const logRes = await fetch('/progress');
                const log = await logRes.text();
                document.getElementById('log').textContent = log;
                document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
                
            } catch(e) {
                console.log('Update error:', e);
            }
            setTimeout(update, 1500);
        }
        update();
    </script>
</body>
</html>
